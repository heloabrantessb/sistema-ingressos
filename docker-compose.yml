version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ingressos_postgres
    restart: always
    environment:
      POSTGRES_DB: ingressos_db
      POSTGRES_USER: ingressos_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: