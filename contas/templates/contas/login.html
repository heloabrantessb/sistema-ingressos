{% extends 'base.html' %}

{% block content %}
<div class="container mt-5" style="max-width: 450px;">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="card-title text-center mb-4">Acessar Conta</h3>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-success w-100 mt-3">Entrar</button>
            </form>
            <p class="mt-3 text-center mb-0">
                Ainda não tem conta? <a href="{% url 'cadastrar' %}">Cadastre-se</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
