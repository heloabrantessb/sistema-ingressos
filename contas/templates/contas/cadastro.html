{% extends 'base.html' %}

{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="card-title text-center mb-4">Criar Conta</h3>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100 mt-3">Cadastrar</button>
            </form>
            <p class="mt-3 text-center mb-0">
                Já tem uma conta? <a href="{% url 'login' %}">Entrar</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
